name: Automatic CD Local Kind Windows
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
permissions:
  contents: read
  packages: read
defaults:
  run:
    shell: powershell
jobs:
  deploy-local-kind:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image name
        run: |
          $ImageName = "ghcr.io/${{ github.repository }}".ToLowerInvariant()
          $ImageTag = "${{ github.event.workflow_run.head_sha }}"
          "IMAGE=$($ImageName):$ImageTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Output "Deploying image $($ImageName):$ImageTag"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull tested image
        run: docker pull --platform linux/amd64 $env:IMAGE

      - name: Ensure Kind cluster exists
        run: |
          $clusters = kind get clusters
          if ($clusters -notcontains "xlabs-projects") {
            kind create cluster --name xlabs-projects --image syednadeembe/xlabs-kind-node:k8s-1.35.1-v1
          }
          kubectl config use-context kind-xlabs-projects
          kubectl get nodes

      - name: Load image into Kind
        run: |
          docker save $env:IMAGE -o image.tar
          kind load image-archive image.tar --name xlabs-projects
          Remove-Item image.tar

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/
          kubectl set image deployment/ai-image-classifier ai-image-classifier=$env:IMAGE
          kubectl rollout status deployment/ai-image-classifier --timeout=180s

      - name: Capture Kubernetes evidence
        if: always()
        run: |
          New-Item -ItemType Directory -Force -Path xlabs-work/evidence | Out-Null
          cmd.exe /c "kubectl get deploy,pods,svc -l app=ai-image-classifier -o wide > xlabs-work\evidence\k8s-resources.txt 2>&1"
          cmd.exe /c "kubectl logs deployment/ai-image-classifier --tail=120 > xlabs-work\evidence\k8s-logs.txt 2>&1"
          cmd.exe /c "kubectl get events --sort-by=.lastTimestamp > xlabs-work\evidence\k8s-events.txt 2>&1"
          exit 0

      - name: Upload Kubernetes evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: local-kind-deploy-evidence
          path: xlabs-work/evidence/
