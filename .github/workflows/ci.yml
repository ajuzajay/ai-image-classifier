name: CI Windows

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: powershell

jobs:
  build-and-smoke-test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          $ImageName = "ghcr.io/${{ github.repository }}".ToLowerInvariant()
          $ImageTag = "${{ github.sha }}"
          "IMAGE=$($ImageName):$ImageTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Output "Building image $($ImageName):$ImageTag"

      - name: Build image
        run: docker build -t $env:IMAGE .

      - name: Run container
        run: |
          $existingContainer = docker ps -aq -f "name=^ai-image-classifier-ci$"
          if ($existingContainer) {
            docker rm -f ai-image-classifier-ci
          }
          docker run -d --name ai-image-classifier-ci -p 8000:8000 $env:IMAGE

      - name: Wait for app
        run: |
          for ($i = 1; $i -le 30; $i++) {
            try {
              Invoke-WebRequest -Uri http://localhost:8000/ -UseBasicParsing -ErrorAction Stop | Out-Null
              exit 0
            } catch {
              Start-Sleep -Seconds 5
            }
          }
          docker logs ai-image-classifier-ci
          exit 1

      - name: Smoke test
        run: |
          New-Item -ItemType Directory -Force -Path xlabs-work/evidence | Out-Null
          Invoke-WebRequest -Uri http://localhost:8000/ -UseBasicParsing -OutFile xlabs-work/evidence/home.html
          curl.exe -fsS -X POST http://localhost:8000/predict -F "file=@test_data/sample_cat.png" -o xlabs-work/evidence/predict-response.json
          Select-String -Path xlabs-work/evidence/predict-response.json -Pattern '"class"'

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-evidence
          path: xlabs-work/evidence/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tested image
        run: docker push $env:IMAGE

      - name: Cleanup
        if: always()
        run: |
          $existingContainer = docker ps -aq -f "name=^ai-image-classifier-ci$"
          if ($existingContainer) {
            docker rm -f ai-image-classifier-ci
          }
          exit 0
